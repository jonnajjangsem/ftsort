<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FT아일랜드 자작곡 소트</title>
<script>
// 로컬 저장 키
const SAVE_KEY = "ftisland_sort";

// 곡 목록 (예시 3곡)
const namMember = ["Flower Rock","Revolution","Wing","So today...","Boom Boom Boom","I change for you","Friends","I want","mi·ra·i","yume",
"Rock'n'roll","Let it go!","Dream sky","Someday","Distance","LIFE","Venus","NEVERLAND","WANNA GO","YUKI",
"STAY","COMPASS","PAPER PLANE","Endless Story","LIFE","Beloved","Fallin' for you","Time To","Black Chocolate",
"オレンジ色の空 (Orange Sky)","Rainy Days","Memory","Falling Star","Try again","Always with you",
"The Way Into You","Siren","On My Way","BE FREE","FREEDOM","Shinin' On","Stay","Beautiful",
"Born To Be A Rock'n Roller","Morning Coffee","Pray","BPM69","Do You Know Why?","Hey Girl","To the light",
"그림자 (Shadow)","Please","빛 (Find a Light)","Primavera","Orange Days","YES or NO","Tornado",
"CRYING IN THE RAIN","Moonlight","DAYDREAMER","Hourglass","My Birthday","Cycle","PUPPY",
"パラレルワールド(Parallel world)","YOU DON'T KNOW WHO I AM","COME ON GIRL",
"素晴らしい人生を(Subarashii jinseio)","AQUA","アイデンティティ (Identity)","imagine","Walking Dead",
"Time","We Are...","Out of Love","Take Me Now","Lose","가면 (Mask)",
"너에게 물들어(Becoming You)","Stand By Me","Paparazzi","Wonderful Life","We Are...",
"JUST DO IT","EMPTINESS","Shadows","Mystery","JUST DO IT","Crazy Love","1234","Turn Up",
"Champagne","Go again","A light in the forest","REASON","원해 (What U Want)","Wind",
"Travel","The Night","Save Me","Still With You","Voice","Parade","나무 (The Wood)",
"Paradise","Stay what you are","What about me?","Hold the moon","Dancing on","GAME",
"Golden","Skyway","SAYONARA","Nowhere","Fade Out (Feat. 유나 of AOA)","Who I Am",
"Pretty Girl","Remember","God Bless You","IF U WANT","Story of glory","Sight of ring",
"SWITCH","I'm coming home","다시 바래 (Hope Again)","신기루 (사랑사랑사랑2) (No Regret)",
"Don't lose yourself","Sunrise Yellow","Beautiful (LOCK UP)","Bones","Set Me Free",
"DOOR","SCALRET","In the Room","Sage","All Of My Life","I'm Still Here","Broken",
"Not Enough","Rising Star (With G.O.P)","F-R-I-E-N-DS","True Romance",
"내게 전해 줄 노래 (Letter to Myself)","BURN IT","Serious","T.I.V (Tears In Vain)",
"INFERNO","나침반 (Journey)","理由 (Reason)","행복 이론 (Theory of Happiness)",
"LIMITLESS","THUNDERSTORM","MONOCHROME","Love in the City",
"작은 나보다 커다란 세상이 문을 열어줄 것 같아 (Cloud)",
"GIANTS","No.3","After the Rain","Sunday Morning","Universe Universe"];

let lstMember = [];
let parent = [];
let equal = [];
let rec = [];
let cmp1, cmp2, head1, head2, nrec;
let numQuestion, totalSize, finishSize, finishFlag;

// 초기화
function initList(){
    var n=0, mid;
    lstMember[n]=[];
    for(var i=0;i<namMember.length;i++) lstMember[n][i]=i;
    parent[n]=-1;
    totalSize=0;
    n++;

    for(var i=0;i<lstMember.length;i++){
        if(lstMember[i].length>=2){
            mid=Math.ceil(lstMember[i].length/2);
            lstMember[n]=lstMember[i].slice(0,mid); parent[n]=i; totalSize+=lstMember[n].length; n++;
            lstMember[n]=lstMember[i].slice(mid); parent[n]=i; totalSize+=lstMember[n].length; n++;
        }
    }

    for(var i=0;i<namMember.length;i++) rec[i]=0;
    nrec=0;

    for(var i=0;i<=namMember.length;i++) equal[i]=-1;

    cmp1=lstMember.length-2;
    cmp2=lstMember.length-1;
    head1=head2=0;
    numQuestion=1;
    finishSize=0;
    finishFlag=0;

    // 화면 표시
    document.getElementById("mainTable").style.display="";
    document.getElementById("infoText").style.display="";
    document.getElementById("resultField").innerHTML="";

    showImage(); // 바로 선택지 표시
    saveProgress();
}

// 선택 후 정렬
function sortList(flag){
    var i;
    if(flag<0){
        rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){
            rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        }
    }
    else if(flag>0){
        rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){
            rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        }
    }
    else{
        rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
        equal[rec[nrec-1]]=lstMember[cmp2][head2];
        rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }

    if(head1<lstMember[cmp1].length && head2==lstMember[cmp2].length){
        while(head1<lstMember[cmp1].length){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    }
    else if(head1==lstMember[cmp1].length && head2<lstMember[cmp2].length){
        while(head2<lstMember[cmp2].length){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }

    if(head1==lstMember[cmp1].length && head2==lstMember[cmp2].length){
        for(i=0;i<lstMember[cmp1].length+lstMember[cmp2].length;i++){
            lstMember[parent[cmp1]][i]=rec[i];
        }
        lstMember.pop(); lstMember.pop();
        cmp1-=2; cmp2-=2;
        head1=head2=0;
        nrec=0;
        for(i=0;i<namMember.length;i++) rec[i]=0;
    }

    if(cmp1<0){
        showResult();
        finishFlag=1;
    } else {
        showImage();
    }

    saveProgress();
}

// 선택지 표시
function showImage(){
    if(finishFlag) return;
    document.getElementById("battleNumber").innerHTML = `Battle No.${numQuestion}<br>${Math.floor(finishSize*100/totalSize)}% sorted`;
    document.getElementById("leftField").innerText = namMember[lstMember[cmp1][head1]];
    document.getElementById("rightField").innerText = namMember[lstMember[cmp2][head2]];
    numQuestion++;
}

// 결과
function showResult(){
    var ranking=1, sameRank=1;
    var str="<table style='width:200px;font-size:12px;margin:auto;border-collapse:collapse;border:1px solid #000'>";
    str+="<tr><td style='background:#000;color:#fff;text-align:center'>순위</td><td style='background:#000;color:#fff;text-align:center'>곡명</td></tr>";
    for(var i=0;i<namMember.length;i++){
        str+=`<tr><td style='border:1px solid #000;text-align:right;padding-right:5px'>${ranking}</td><td style='border:1px solid #000;padding-left:5px'>${namMember[lstMember[0][i]]}</td></tr>`;
        if(i<namMember.length-1){
            if(equal[lstMember[0][i]]==lstMember[0][i+1]) sameRank++;
            else { ranking+=sameRank; sameRank=1; }
        }
    }
    str+="</table>";
    document.getElementById("resultField").innerHTML=str;
    document.getElementById("mainTable").style.display="none";
    document.getElementById("infoText").style.display="none";
    localStorage.removeItem(SAVE_KEY);
}

// 저장/불러오기
function saveProgress(){ localStorage.setItem(SAVE_KEY, JSON.stringify({lstMember,parent,equal,rec,cmp1,cmp2,head1,head2,numQuestion,finishSize,finishFlag,nrec,totalSize})); }
function loadProgress(){
    const data = localStorage.getItem(SAVE_KEY);
    if(!data) return false;
    const obj=JSON.parse(data);
    lstMember=obj.lstMember; parent=obj.parent; equal=obj.equal; rec=obj.rec;
    cmp1=obj.cmp1; cmp2=obj.cmp2; head1=obj.head1; head2=obj.head2;
    numQuestion=obj.numQuestion; finishSize=obj.finishSize; finishFlag=obj.finishFlag;
    nrec=obj.nrec; totalSize=obj.totalSize;
    return true;
}

// 클릭
function choose(flag){ if(finishFlag) return; sortList(flag); }

// 다시 시작
function restartSort(){ localStorage.removeItem(SAVE_KEY); initList(); }

window.onload = function(){
    if(!loadProgress()) initList();
    else showImage();
};
</script>

<style>
body{ font-size:12px; font-family:'돋움',sans-serif; text-align:center; }
#mainTable{ width:410px; margin:auto; border-spacing:10px 5px; }
#leftField,#rightField{ width:120px;height:150px;border:1px solid #000;cursor:pointer; display:table-cell; vertical-align:middle; text-align:center; padding:5px; overflow-wrap:break-word; word-break:break-word;}
.middleField{ width:120px;height:70px;border:1px solid #000;cursor:pointer; display:table-cell; vertical-align:middle; text-align:center; padding:5px; overflow-wrap:break-word; word-break:break-word;}
button{ margin-top:15px; font-size:12px; }
</style>
</head>
<body>

<table id="mainTable">
<tr><td id="battleNumber" colspan="3" style="padding-bottom:10px;"></td></tr>
<tr>
<td id="leftField" onclick="choose(-1)" rowspan="2"></td>
<td class="middleField" onclick="choose(0)">둘 다 좋다 (Tie)</td>
<td id="rightField" onclick="choose(1)" rowspan="2"></td>
</tr>
<tr>
<td class="middleField" onclick="choose(0)">모르겠다 (Skip)</td>
</tr>
</table>

<button onclick="restartSort()">처음부터 (Reset)</button>

<br><br>
<div id="resultField"></div>
<div id="infoText">
<p>작사, 작곡 참여 곡 포함</p>
<p>오탈자, 오류 등은 트위터 @jonnajjangsem으로 제보해 주세요!</p>
</div>

</body>
</html>
